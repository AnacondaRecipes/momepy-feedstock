{% set name = "momepy" %}
{% set version = "0.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/momepy-{{ version }}.tar.gz
  sha256: 4994794295b06449117ed07c8929d3109df0efdba03f647d889738c4d744835f

build:
  skip: true  # [py<311]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - toml
  run:
    - python
    - geopandas >=0.14.0
    - libpysal >=4.12.0
    - networkx >=3.2
    - packaging
    - pandas >=2.0
    - shapely >=2
    - tqdm >=4.65

test:
  source_files:
    - momepy/tests
  imports:
    - momepy
  commands:
    - pip check
    - pytest -vv momepy/tests
  requires:
    - pip
    - pytest
    - inequality
    - mapclassify
    - numba
    - esda

about:
  home: https://docs.momepy.org
  summary: Urban Morphology Measuring Toolkit
  description: |
    Momepy is a library for quantitative analysis of urban form - urban morphometrics.
    It is part of PySAL (Python Spatial Analysis Library) and is built on top of GeoPandas,
    other PySAL modules, and networkX.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://docs.momepy.org
  dev_url: https://github.com/pysal/momepy

extra:
  recipe-maintainers:
    - psteyer
